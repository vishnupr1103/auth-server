server:
  servlet:
    context-path: /auth-server

spring:
  application:
    name: auth-server

  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: classpath:keys/public.pem

  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/task-manager}
    username: ${JDBC_DATABASE_USERNAME:postgres}
    password: ${JDBC_DATABASE_PASSWORD:postgres}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        id:
          new_generator_mappings: true

jwt:
  issuer: auth-service
  access-token-expiration: 900000
  algorithm: RS256
  keys:
    private-key-path: classpath:keys/private.pem
    public-key-path: classpath:keys/public.pem

error:
  handling:
    http-status-in-json-response: true
    exception-logging: NO_LOGGING
    full-stacktrace-http-statuses: 5xx
    log-levels:
      5xx: ERROR
    codes:
      UserUsernameUnique: USER_USERNAME_UNIQUE
      UserPasswordUnique: USER_PASSWORD_UNIQUE
      RoleNameUnique: ROLE_NAME_UNIQUE
springdoc:
  pathsToMatch: /, /api/**
