version: '3.8'

services:

  # --- PostgreSQL Database ---
  postgres:
    image: postgres:15
    container_name: auth-postgres
    restart: always
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # --- Your Auth Server App ---
  app:
    build: .                        # uses your existing Dockerfile
    container_name: auth-server
    restart: always
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DATABASE_URL: jdbc:postgresql://postgres:5432/authdb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SPRING_PROFILES_ACTIVE: dev   # activates application-dev.yml
    depends_on:
      - postgres
    volumes:
      - ./keys:/app/keys            # mounts your PEM keys into the container

volumes:
  postgres-data: